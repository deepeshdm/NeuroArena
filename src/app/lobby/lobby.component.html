
<div class="lobby-main-container">

    <!-- LEFT PART OF SCREEN -->
    <div class="main-content-container">

        <div style="display:flex;justify-content:space-between;gap: 2rem;">

            <div style="display:flex;flex-direction: column; gap: 1rem;">
                <div class="flex-row">
                    <div class="blue-ball"></div>
                    <div class="light-blue"> STATUS : MATCHING </div>
                </div>
                <div style="display:flex;flex-direction: column;gap:0;"> 
                    <div class="synching"> SYNCING </div> <br> 
                    <div class="network"> NEURAL </div> <br> 
                    <div class="network"> NETWORKS </div> 
                </div>
                <div class="flex-row">
                    <div class="grey-text"> ENCRYPTED ROOM ID : </div>
                    <div class="roomid-box trans-box2"> 
                        <div class="roomid"> #482-910 </div>
                        <img class="roomicon" src="roomid-icon.svg" alt=""/> 
                    </div>
                </div>
            </div>

            <div class="neural-cap-container trans-box2"> 
                <div class="slot-circle">
                    <div class="current">7</div>
                    <div class="total">/10</div>
                </div>
                <div style="display:flex;flex-direction: column;gap:1rem;"> 
                    <div class="header"> Neural Capacity </div>
                    <div class="subheader"> 3 Slots remaining for link stability </div>
                    <div class="slots-container">
                        <div class="slot-bar active"></div> 
                        <div class="slot-bar active"></div> 
                        <div class="slot-bar active"></div> 
                        <div class="slot-bar active"></div> 
                        <div class="slot-bar active"></div> 
                        <div class="slot-bar waiting"></div> 
                        <div class="slot-bar waiting"></div> 
                        <div class="slot-bar waiting"></div> 
                        <div class="slot-bar waiting"></div> 
                        <div class="slot-bar waiting"></div> 
                    </div>
                </div>
            </div>

        </div>


        <div class="flex-sb" style="width:100%;">
            <!-- INITIATE BUTTON -->
            <button class="join-btn">
                <div class="flex-row">
                    <img class="join-btn-img" src="lighting.svg" alt="" />
                    <div class="join-btn-txt"> Initiate Neural Link </div>
                </div>
                <div class="join-btn-description"> Waiting for match authority (3 remaining) </div>
            </button>
            <!-- PULSE BUTTON -->
             <button class="pulse-btn">
                <div class="flex-col" style="justify-content: center; align-items: center;"> 
                    <img class="pulse-btn-icon" src="pulse.svg" />
                    <div class="pulse-btn-txt"> Send Pulse </div>
                </div>
             </button>
        </div>

    </div>

    <!-- RIGHT PART OF SCREEN -->
    <div class="info-content-container">


        <div class="trans-box2 parameter-box">
            <div class="flex-row">
                <img style="width:1rem;height:1rem;" src="parameters.svg" alt="" />
                <div class="light-pink-125"> Arena Parameters </div>
            </div>
            <div class="divider"></div>
            <div class="flex-col">
                <div class="room-parameter"> 
                    <div class="param-text"> Questions </div>
                    <div class="param-value"> 10 Rounds </div>
                </div>
                <div class="room-parameter"> 
                    <div class="param-text"> Time Limit </div>
                    <div class="param-value"> 30s/Burst </div>
                </div>
                <div class="room-parameter"> 
                    <div class="param-text"> Scoring </div>
                    <div class="param-value param-blue"> Speed-Weighted </div>
                </div>
                <div class="room-parameter"> 
                    <div class="param-text"> Complexity </div>
                    <div class="param-value param-pink"> Neural Level IV </div>
                </div>
            </div>
        </div>


        <div class="trans-box2 live-box">
            <div class="flex-row">
                <div class="blue-ball"></div>
                <div class="light-pink-125"> Activity Feed </div>
            </div>
            <div class="divider"></div>
        </div>

    </div>

</div>
